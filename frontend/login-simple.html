<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema de Gestión</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        .title {
            color: #333;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:hover {
            background: #0056b3;
        }
        .message {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: none;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .demo {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1 class="title">🎯 Gestión de Metas</h1>
        
        <div id="message" class="message"></div>
        
        <form onsubmit="return login(event)">
            <div class="input-group">
                <label>Email:</label>
                <input type="email" id="email" placeholder="admin@gestionmetas.com" required>
            </div>
            
            <div class="input-group">
                <label>Contraseña:</label>
                <input type="password" id="password" placeholder="admin123" required>
            </div>
            
            <button type="submit" class="btn">Iniciar Sesión</button>
        </form>
        
        <div class="demo">
            <strong>Usuarios de prueba:</strong><br>
            Admin: admin@gestionmetas.com / admin123<br>
            Usuario: usuario@gestionmetas.com / user123
        </div>
    </div>

    <script>
        function login(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Validación simple
            if (!email || !password) {
                showMessage('Por favor completa todos los campos', 'error');
                return;
            }
            
            // Usuarios válidos
            const usuarios = [
                { email: 'admin@gestionmetas.com', password: 'admin123', nombre: 'Administrador' },
                { email: 'usuario@gestionmetas.com', password: 'user123', nombre: 'Usuario' }
            ];
            
            const usuario = usuarios.find(u => u.email === email && u.password === password);
            
            if (usuario) {
                showMessage(`¡Bienvenido ${usuario.nombre}! Redirigiendo...`, 'success');
                
                // Guardar sesión
                localStorage.setItem('usuario', JSON.stringify(usuario));
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                showMessage('Credenciales incorrectas', 'error');
            }
        }
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
        }
        
        // Verificar si ya está logueado
        window.onload = function() {
            const usuario = localStorage.getItem('usuario');
            if (usuario) {
                window.location.href = 'dashboard.html';
            }
        };
    </script>
</body>
</html>
