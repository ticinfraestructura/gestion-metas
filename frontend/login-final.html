<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema de Gestión</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 15px;
        }
        .btn:hover {
            background: #5a67d8;
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .message {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }
        .success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }
        .demo {
            background: #f0f8ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
        .demo h4 {
            margin-bottom: 10px;
            color: #333;
        }
        .demo p {
            margin: 5px 0;
        }
        .loading {
            display: none;
            margin: 10px 0;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🎯</div>
        <h1>Sistema de Gestión</h1>
        <p class="subtitle">Inicia sesión para continuar</p>
        
        <div id="message" class="message"></div>
        
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="admin@gestionmetas.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="admin123" required>
            </div>
            
            <button type="submit" class="btn" id="loginBtn">Iniciar Sesión</button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Verificando credenciales...</p>
            </div>
        </form>
        
        <div class="demo">
            <h4>🔑 Usuarios de Prueba:</h4>
            <p><strong>Administrador:</strong> admin@gestionmetas.com / admin123</p>
            <p><strong>Usuario:</strong> usuario@gestionmetas.com / user123</p>
        </div>
    </div>

    <script>
        // Prevenir cualquier loop o redirección infinita
        let isProcessing = false;
        let redirectTimeout = null;
        
        // Usuarios válidos
        const usuariosValidos = [
            { email: 'admin@gestionmetas.com', password: 'admin123', rol: 'ADMIN', nombre: 'Administrador' },
            { email: 'usuario@gestionmetas.com', password: 'user123', rol: 'USUARIO', nombre: 'Usuario de Prueba' }
        ];
        
        // Limpiar cualquier timeout existente
        function clearAllTimeouts() {
            if (redirectTimeout) {
                clearTimeout(redirectTimeout);
                redirectTimeout = null;
            }
        }
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            
            // Auto-ocultar mensaje después de 5 segundos
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
        
        function setLoading(loading) {
            const loadingDiv = document.getElementById('loading');
            const loginBtn = document.getElementById('loginBtn');
            
            if (loading) {
                loadingDiv.style.display = 'block';
                loginBtn.disabled = true;
                loginBtn.textContent = 'Iniciando sesión...';
            } else {
                loadingDiv.style.display = 'none';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Iniciar Sesión';
            }
        }
        
        function handleLogin(event) {
            event.preventDefault();
            
            // Prevenir múltiples envíos
            if (isProcessing) {
                showMessage('Ya hay un proceso de login en curso', 'error');
                return false;
            }
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            // Validación básica
            if (!email || !password) {
                showMessage('Por favor, completa todos los campos', 'error');
                return false;
            }
            
            // Marcar como procesando
            isProcessing = true;
            setLoading(true);
            clearAllTimeouts();
            
            // Simular proceso de autenticación
            setTimeout(() => {
                try {
                    const usuario = usuariosValidos.find(u => u.email === email && u.password === password);
                    
                    if (usuario) {
                        showMessage(`¡Bienvenido ${usuario.nombre}! Redirigiendo...`, 'success');
                        
                        // Guardar sesión
                        localStorage.setItem('usuario_sesion', JSON.stringify(usuario));
                        localStorage.setItem('login_timestamp', Date.now().toString());
                        
                        // Redirección única y segura
                        redirectTimeout = setTimeout(() => {
                            window.location.replace('dashboard-final.html');
                        }, 1500);
                        
                    } else {
                        showMessage('Credenciales incorrectas. Intenta nuevamente.', 'error');
                    }
                } catch (error) {
                    console.error('Error en login:', error);
                    showMessage('Error inesperado. Intenta nuevamente.', 'error');
                } finally {
                    isProcessing = false;
                    setLoading(false);
                }
            }, 1000);
            
            return false;
        }
        
        // Verificar sesión al cargar
        window.addEventListener('load', () => {
            // Limpiar cualquier loop anterior
            clearAllTimeouts();
            
            // Verificar si ya hay sesión activa
            const sesion = localStorage.getItem('usuario_sesion');
            if (sesion) {
                try {
                    const usuario = JSON.parse(sesion);
                    showMessage(`Sesión activa detectada. Bienvenido de nuevo ${usuario.nombre}`, 'success');
                    
                    // Redirigir después de 2 segundos
                    redirectTimeout = setTimeout(() => {
                        window.location.replace('dashboard-final.html');
                    }, 2000);
                } catch (error) {
                    // Si hay error en la sesión, limpiarla
                    localStorage.removeItem('usuario_sesion');
                    localStorage.removeItem('login_timestamp');
                }
            }
        });
        
        // Prevenir redirecciones al cerrar la página
        window.addEventListener('beforeunload', () => {
            clearAllTimeouts();
        });
        
        // Prevenir loops con history
        window.addEventListener('popstate', () => {
            clearAllTimeouts();
        });
    </script>
</body>
</html>
