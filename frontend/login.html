<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Metas - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #3b82f6;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-bottom: 15px;
        }
        
        .btn:hover {
            background: #2563eb;
        }
        
        .btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #6b7280;
            font-size: 14px;
            padding: 10px;
        }
        
        .btn-secondary:hover {
            background: #4b5563;
        }
        
        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 10px 0;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .demo-users {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 12px;
            color: #6b7280;
        }
        
        .demo-users h4 {
            margin-bottom: 10px;
            color: #374151;
        }
        
        .demo-users p {
            margin: 5px 0;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🎯</div>
        <h1>Sistema de Gestión de Metas</h1>
        <p class="subtitle">Inicia sesión para acceder al sistema</p>
        
        <div id="error-message" class="error hidden"></div>
        <div id="success-message" class="success hidden"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" required placeholder="tu@correo.com">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Tu contraseña">
            </div>
            
            <button type="submit" class="btn" id="loginBtn">
                Iniciar Sesión
            </button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Verificando credenciales...</p>
            </div>
        </form>
        
        <button class="btn btn-secondary" onclick="mostrarRecuperacion()">
            ¿Olvidaste tu contraseña?
        </button>
        
        <div id="recuperacion-form" class="hidden">
            <div class="form-group">
                <label for="recuperacion-email">Correo Electrónico para recuperación</label>
                <input type="email" id="recuperacion-email" placeholder="tu@correo.com">
            </div>
            <button class="btn btn-secondary" onclick="enviarRecuperacion()">
                Enviar enlace de recuperación
            </button>
            <button class="btn btn-secondary" onclick="ocultarRecuperacion()">
                Volver al login
            </button>
        </div>
        
        <div class="demo-users">
            <h4>Usuarios de Demostración:</h4>
            <p><strong>Administrador:</strong> admin@gestionmetas.com / admin123</p>
            <p><strong>Usuario:</strong> usuario@gestionmetas.com / user123</p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api';
        
        // Usuarios válidos (en producción esto vendría del backend)
        const usuariosValidos = [
            { email: 'admin@gestionmetas.com', password: 'admin123', rol: 'ADMIN', nombre: 'Administrador' },
            { email: 'usuario@gestionmetas.com', password: 'user123', rol: 'USUARIO', nombre: 'Usuario de Prueba' }
        ];
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                mostrarError('Por favor, completa todos los campos');
                return;
            }
            
            mostrarLoading(true);
            ocultarMensajes();
            
            try {
                // Simular llamada al backend
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                const usuario = usuariosValidos.find(u => u.email === email && u.password === password);
                
                if (usuario) {
                    // Guardar sesión en localStorage
                    localStorage.setItem('usuario', JSON.stringify(usuario));
                    localStorage.setItem('token', 'mock-jwt-token-' + Date.now());
                    
                    mostrarExito('¡Inicio de sesión exitoso! Redirigiendo...');
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    mostrarError('Credenciales incorrectas. Por favor, verifica tu correo y contraseña.');
                }
            } catch (error) {
                mostrarError('Error de conexión. Por favor, intenta más tarde.');
            } finally {
                mostrarLoading(false);
            }
        });
        
        function mostrarRecuperacion() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('recuperacion-form').classList.remove('hidden');
            ocultarMensajes();
        }
        
        function ocultarRecuperacion() {
            document.getElementById('recuperacion-form').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            ocultarMensajes();
        }
        
        function enviarRecuperacion() {
            const email = document.getElementById('recuperacion-email').value;
            
            if (!email) {
                mostrarError('Por favor, ingresa tu correo electrónico');
                return;
            }
            
            // Verificar si el correo existe en nuestros usuarios de demo
            const usuario = usuariosValidos.find(u => u.email === email);
            
            if (usuario) {
                mostrarExito(`Se ha enviado un enlace de recuperación a ${email}. En un entorno real, recibirías un correo para restablecer tu contraseña.`);
                
                setTimeout(() => {
                    ocultarRecuperacion();
                }, 3000);
            } else {
                mostrarError('Este correo no está registrado en el sistema.');
            }
        }
        
        function mostrarError(mensaje) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = mensaje;
            errorDiv.classList.remove('hidden');
            document.getElementById('success-message').classList.add('hidden');
        }
        
        function mostrarExito(mensaje) {
            const exitoDiv = document.getElementById('success-message');
            exitoDiv.textContent = mensaje;
            exitoDiv.classList.remove('hidden');
            document.getElementById('error-message').classList.add('hidden');
        }
        
        function ocultarMensajes() {
            document.getElementById('error-message').classList.add('hidden');
            document.getElementById('success-message').classList.add('hidden');
        }
        
        function mostrarLoading(show) {
            const loading = document.getElementById('loading');
            const loginBtn = document.getElementById('loginBtn');
            
            if (show) {
                loading.style.display = 'block';
                loginBtn.disabled = true;
                loginBtn.textContent = 'Iniciando sesión...';
            } else {
                loading.style.display = 'none';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Iniciar Sesión';
            }
        }
        
        // Verificar si ya hay una sesión activa
        window.addEventListener('load', () => {
            const usuario = localStorage.getItem('usuario');
            if (usuario) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
