version: '3.8'

services:

  # ── Base de datos MySQL ────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: gestion-metas-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gestion_metas}
      MYSQL_USER: ${MYSQL_USER:-gestion_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gestion_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend Node.js + Prisma ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestion-metas-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: mysql://${MYSQL_USER:-gestion_user}:${MYSQL_PASSWORD:-gestion_password}@mysql:3306/${MYSQL_DATABASE:-gestion_metas}
      BACKEND_URL: http://localhost:3001
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - uploads_data:/app/uploads
    command: >
      sh -c "npx prisma db push --accept-data-loss &&
             node seed-mysql.js &&
             node src/server-mysql.js"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend React (build + nginx) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:3001/api
    container_name: gestion-metas-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local

networks:
  app-network:
    driver: bridge
